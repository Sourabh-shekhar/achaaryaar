<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achaar Yaar — Loading</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Work+Sans:wght@400;500;600&display=swap');

  :root{
    --bg-deep:   #1B120D;
    --bg-mid:    #2B1A13;
    --brass:     #C9973F;
    --brass-lt:  #E8C376;
    --maroon:    #7C2233;
    --pine:      #2F5233;
    --ivory:     #F4EAD9;
    --ivory-dim: #C9BBA8;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg-deep);
    overflow:hidden;
    font-family:'Work Sans', sans-serif;
  }

  .stage{
    position:relative;
    width:100%; height:100vh;
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(ellipse at 50% 45%, var(--bg-mid) 0%, var(--bg-deep) 62%, #100B08 100%);
    overflow:hidden;
  }

  .stage::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(201,151,63,0.05), transparent 40%),
      radial-gradient(circle at 80% 75%, rgba(124,34,51,0.06), transparent 45%);
    pointer-events:none;
  }
  .stage::after{
    content:"";
    position:absolute; inset:0;
    box-shadow: inset 0 0 18vw rgba(0,0,0,0.65);
    pointer-events:none;
    z-index:5;
  }

  /* ---- 3D scene root ---- */
  .scene{
    position:relative;
    width:min(70vw, 480px);
    height:min(70vw, 480px);
    perspective:1400px;
    display:flex; align-items:center; justify-content:center;
  }

  /* ---- spinning 3D plate of stripe-colored tiles, like a thali seen at an angle ---- */
  .plate{
    position:absolute;
    width:1px; height:1px;
    top:56%; left:50%;
    transform-style:preserve-3d;
    transform: translate(-50%,-50%) rotateX(66deg);
    opacity:0;
    animation: plate-in 1.1s cubic-bezier(.2,.7,.3,1) 0.1s forwards;
  }
  @keyframes plate-in{
    from{ opacity:0; transform: translate(-50%,-50%) rotateX(66deg) scale(0.6); }
    to  { opacity:1; transform: translate(-50%,-50%) rotateX(66deg) scale(1); }
  }

  .wheel{
    position:absolute;
    width:1px; height:1px;
    transform-style:preserve-3d;
    animation: wheel-spin 16s linear infinite;
  }
  @keyframes wheel-spin{
    from{ transform:rotateY(0deg); }
    to  { transform:rotateY(360deg); }
  }

  .tile{
    position:absolute;
    width:16px; height:150px;
    margin:-75px 0 0 -8px;
    border-radius:8px;
    filter:brightness(var(--b, 1));
    box-shadow:0 0 14px rgba(0,0,0,0.35);
  }

  /* dust drifting above the plate */
  .dust{
    position:absolute;
    border-radius:50%;
    background:radial-gradient(circle, var(--brass-lt), transparent 70%);
    opacity:0;
    filter:blur(0.5px);
    animation:drift 7s ease-in infinite;
    z-index:3;
  }
  @keyframes drift{
    0%   { transform:translateY(0) translateX(0); opacity:0; }
    10%  { opacity:0.5; }
    85%  { opacity:0.12; }
    100% { transform:translateY(-32vh) translateX(var(--dx, 12px)); opacity:0; }
  }

  /* soft contact shadow beneath the floating logo */
  .contact-shadow{
    position:absolute;
    width:min(34vw, 220px); height:38px;
    top:64%; left:50%;
    transform:translate(-50%,-50%);
    background:radial-gradient(ellipse, rgba(0,0,0,0.55), transparent 72%);
    filter:blur(4px);
    z-index:2;
    animation: shadow-in 1.5s ease-out 0.05s both;
    transition: transform 0.25s ease-out, opacity 0.25s ease-out;
  }
  @keyframes shadow-in{
    from{ opacity:0; transform:translate(-50%,-50%) scale(0.5); }
    to  { opacity:1; transform:translate(-50%,-50%) scale(1); }
  }

  /* logo: enters spinning out of depth, then hovers with interactive 3D tilt */
  .logo-wrap{
    position:relative;
    width:min(40vw, 260px); height:min(40vw, 260px);
    transform-style:preserve-3d;
    z-index:4;
    animation: coin-drop 1.6s cubic-bezier(.16,.85,.28,1.12) 0.05s both;
    will-change:transform;
  }
  @keyframes coin-drop{
    0%   { transform:translateZ(-900px) rotateY(-760deg) rotateX(18deg) scale(0.5); opacity:0; filter:blur(10px); }
    45%  { opacity:1; filter:blur(0px); }
    72%  { transform:translateZ(30px) rotateY(20deg) rotateX(-6deg) scale(1.05); }
    100% { transform:translateZ(0px) rotateY(0deg) rotateX(0deg) scale(1); opacity:1; filter:blur(0px); }
  }

  .logo-wrap img{
    width:100%; height:100%;
    display:block;
    border-radius:50%;
    filter:drop-shadow(0 18px 30px rgba(0,0,0,0.6));
    backface-visibility:hidden;
  }

  .sweep{
    position:absolute; inset:0;
    border-radius:50%;
    background:conic-gradient(from -40deg,
      transparent 0deg,
      rgba(232,195,118,0.9) 8deg,
      transparent 22deg,
      transparent 360deg);
    mix-blend-mode:screen;
    opacity:0;
    animation: sweep-once 1.3s ease-out 1.55s 1;
  }
  @keyframes sweep-once{
    0%   { transform:rotate(0deg);   opacity:0; }
    12%  { opacity:0.9; }
    100% { transform:rotate(360deg); opacity:0; }
  }

  .tagline-col{
    position:absolute;
    bottom:9%;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    opacity:0;
    animation: rise-in 0.9s ease-out 1.25s forwards;
    z-index:6;
    width:100%;
  }
  @keyframes rise-in{
    from{ opacity:0; transform:translateX(-50%) translateY(10px); }
    to  { opacity:1; transform:translateX(-50%) translateY(0); }
  }

  .tagline{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:400;
    font-size:clamp(15px, 2.1vw, 19px);
    color:var(--ivory);
    letter-spacing:0.02em;
    margin:0 0 14px;
  }

  .loading-track{
    width:120px; height:2px;
    margin:0 auto;
    background:rgba(244,234,217,0.14);
    border-radius:2px;
    overflow:hidden;
  }
  .loading-fill{
    height:100%;
    width:40%;
    background:linear-gradient(90deg, transparent, var(--brass-lt), transparent);
    animation: loading-sweep 1.4s ease-in-out 1.55s infinite;
    border-radius:2px;
  }
  @keyframes loading-sweep{
    0%   { transform:translateX(-140%); }
    100% { transform:translateX(340%); }
  }

  .label{
    margin-top:12px;
    font-size:10px;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--ivory-dim);
    opacity:0;
    animation: rise-in 0.9s ease-out 1.7s forwards;
  }

  @media (prefers-reduced-motion: reduce){
    .wheel, .logo-wrap, .sweep, .tagline-col, .loading-fill, .label, .dust, .plate, .contact-shadow{
      animation:none !important;
      opacity:1 !important;
      transform:translate(-50%,-50%) rotateX(66deg) !important;
    }
    .logo-wrap{ transform:none !important; }
  }
</style>
</head>

  <div class="tagline-col">
    <p class="tagline">Har Niwale Ka Yaar</p>
    <div class="loading-track"><div class="loading-fill"></div></div>
    <div class="label">Opening the jar…</div>
  </div>
</div>

<script>
  const stage = document.getElementById('stage');
  const wheel = document.getElementById('wheel');
  const logoWrap = document.getElementById('logoWrap');
  const shadow = document.getElementById('shadow');

  // Build the 3D spinning plate out of stripe-colored tiles
  const colors = ['#C9973F', '#7C2233', '#2F5233'];
  const tileCount = 18;
  const radius = 150;
  for (let i = 0; i < tileCount; i++){
    const t = document.createElement('div');
    t.className = 'tile';
    const angle = (360 / tileCount) * i;
    const brightness = 0.55 + 0.55 * ((Math.cos(angle * Math.PI/180) + 1) / 2);
    t.style.background = colors[i % colors.length];
    t.style.setProperty('--b', brightness.toFixed(2));
    t.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;
    wheel.appendChild(t);
  }

  // Drifting spice-dust
  const n = 10;
  for (let i = 0; i < n; i++){
    const d = document.createElement('div');
    d.className = 'dust';
    const size = 2 + Math.random()*3;
    d.style.width = size + 'px';
    d.style.height = size + 'px';
    d.style.left = (10 + Math.random()*80) + '%';
    d.style.top = (50 + Math.random()*30) + '%';
    d.style.setProperty('--dx', (Math.random()*40 - 20) + 'px');
    d.style.animationDelay = (Math.random()*7) + 's';
    d.style.animationDuration = (6 + Math.random()*4) + 's';
    stage.appendChild(d);
  }

  // After the entrance flip finishes, hand control to a live 3D hover:
  // gentle idle sway plus response to pointer position (desktop),
  // both driving real rotateX/rotateY/translateZ on the logo.
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let targetRX = 0, targetRY = 0;
  let curRX = 0, curRY = 0;
  let live = false;

  logoWrap.addEventListener('animationend', (e) => {
    if (e.animationName === 'coin-drop'){
      live = true;
    }
  });

  stage.addEventListener('mousemove', (e) => {
    const r = stage.getBoundingClientRect();
    const dx = ((e.clientX - r.left) / r.width - 0.5) * 2;   // -1..1
    const dy = ((e.clientY - r.top)  / r.height - 0.5) * 2;  // -1..1
    targetRY = dx * 16;
    targetRX = -dy * 12;
  });
  stage.addEventListener('mouseleave', () => { targetRX = 0; targetRY = 0; });

  function tick(t){
    if (live && !reduceMotion){
      const idleRY = Math.sin(t * 0.00045) * 6;
      const idleRX = Math.cos(t * 0.00038) * 4;
      const bob    = Math.sin(t * 0.0009) * 8;

      curRX += ((targetRX + idleRX) - curRX) * 0.06;
      curRY += ((targetRY + idleRY) - curRY) * 0.06;

      logoWrap.style.transform =
        `translateZ(${bob}px) rotateX(${curRX}deg) rotateY(${curRY}deg)`;

      const lift = (bob + 8) / 16; // 0..1
      shadow.style.transform = `translate(-50%,-50%) scale(${1 - lift*0.18})`;
      shadow.style.opacity = (0.85 - lift*0.35).toFixed(2);
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
</script>
